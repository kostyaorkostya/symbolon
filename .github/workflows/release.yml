name: release
on:
  push:
    tags: ['v*']
# Two-stage shape: matrix builds upload workflow artifacts; a single
# downstream release job downloads everything and makes ONE
# action-gh-release call. The previous shape had each matrix runner
# invoke softprops/action-gh-release independently, and on Immutable
# Releases repos that races: the first runner creates and (in
# v2.6+) publishes the release, which locks it; the second runner
# then hits "Cannot upload assets to an immutable release" when its
# action call tries to attach binaries.
#
# Reference: softprops/action-gh-release README on Immutable
# Releases (the action uploads-before-publish for standard
# releases, which only helps when there's a single publisher).
concurrency:
  # Serialize per-tag so a second push of the same tag (or a tag
  # re-push) can't race the in-flight publish. Cancel-in-progress
  # is OFF: a half-finished publish should run to completion, not
  # be killed mid-asset-upload.
  group: release-${{ github.ref }}
  cancel-in-progress: false
# Default to read-only at the workflow level; only the `release`
# job opts in to `contents: write`. Build jobs don't touch the
# release surface, so they don't need write access.
permissions:
  contents: read
jobs:
  build:
    name: build-${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      # The GitHub-hosted ubuntu-latest runner ships rustup + a recent
      # stable rustc pre-installed.  rust-toolchain.toml in the repo
      # tells rustup which toolchain to use; we just need to add the
      # target.  No third-party rustup action required.
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      # Install zig from the official ziglang.org release.  Pinning the
      # version means a compromised ziglang.org would still need to
      # match a known sha256 to slip a bad binary through.  Bump
      # ZIG_VERSION and ZIG_SHA256 together when updating.
      - name: Install zig
        run: |
          set -euo pipefail
          ZIG_VERSION=0.13.0
          ZIG_SHA256=d45312e61ebcc48032b77bc4cf7fd6915c11fa16e4aad116b66c9468211230ea
          curl -fsSLO "https://ziglang.org/download/${ZIG_VERSION}/zig-linux-x86_64-${ZIG_VERSION}.tar.xz"
          echo "${ZIG_SHA256}  zig-linux-x86_64-${ZIG_VERSION}.tar.xz" | sha256sum -c -
          tar -xf "zig-linux-x86_64-${ZIG_VERSION}.tar.xz"
          echo "${PWD}/zig-linux-x86_64-${ZIG_VERSION}" >> "${GITHUB_PATH}"
      - name: Install cargo-zigbuild
        run: cargo install --locked cargo-zigbuild
      # Per-runner path remap. $HOME and $GITHUB_WORKSPACE are
      # shell-expanded by GHA before cargo sees them — no
      # hardcoded usernames live in the repo. Without this, every
      # `tracing::event!` callsite in our deps embeds the absolute
      # registry path (`/home/runner/.cargo/registry/src/...`) in
      # `.rodata`, which leaks the runner's home dir into produced
      # logs / panic messages and wastes ~20 KB of repeated prefix.
      # `--remap-path-scope=all` is required to cover macro-
      # expanded paths (rust-lang/rust#83635); without it only
      # DWARF debuginfo is remapped.
      - name: Build
        run: |
          set -euo pipefail
          # Auto-discover the active crates.io registry-source
          # directory. The `index.crates.io-<hash>/` segment is
          # unstable (Cargo recently switched the hash algorithm
          # to rustc-stable-hash and the dir name changed once
          # already), so we glob it instead of hardcoding. ls -td
          # picks the most recently used dir if multiple linger.
          # Cargo must have been invoked at least once on this
          # runner for this dir to exist — `actions/checkout`
          # then `rustup target add` populates enough for the
          # registry index to be created by the next cargo step;
          # if not, fall back to a partial trim leaving the hash
          # visible.
          CARGO_REG_SRC="${CARGO_HOME:-${HOME}/.cargo}/registry/src"
          INDEX_DIR="$(ls -td "${CARGO_REG_SRC}"/index.crates.io-* 2>/dev/null | head -1)"
          if [ -n "${INDEX_DIR}" ] && [ -d "${INDEX_DIR}" ]; then
            CRATES_REMAP="--remap-path-prefix=${INDEX_DIR}/=cr/"
          else
            CRATES_REMAP="--remap-path-prefix=${CARGO_REG_SRC}/="
          fi
          # No LLVM-args size levers — tried + reverted; gains
          # were small and the flag-name churn between LLVM
          # versions adds operational cost. See scripts/release-build.sh.
          export CARGO_BUILD_RUSTFLAGS="--remap-path-scope=all ${CRATES_REMAP} --remap-path-prefix=${HOME}/.rustup/toolchains/=tc/ --remap-path-prefix=${GITHUB_WORKSPACE}/=./"
          cargo zigbuild --release --locked --target ${{ matrix.target }} \
            --bin symbolon --bin git-credential-symbolon
      # Drop stack-unwind tables. `panic = "abort"` in the release
      # profile means we never unwind, but rustc still emits
      # `.eh_frame` / `.eh_frame_hdr` / `.gcc_except_table` (the
      # linker won't GC them on its own because `.eh_frame_hdr`
      # references `.eh_frame`). Stripping them post-build saves
      # ~400 KB. Backtraces and DWARF-based perf unwinding stop
      # working — neither is in our diagnostic loop (we use
      # tracing/JSON logs and `--call-graph=fp` profiling).
      #
      # `llvm-strip` rather than GNU `strip`: Ubuntu's stock
      # binutils is single-target (host x86_64 only), so the host
      # `strip` can't recognise aarch64 ELF and bails with "File
      # format not recognized" — BFD's per-arch backend isn't
      # compiled in. LLVM's object library is multi-target. The
      # ubuntu-24.04 image installs `llvm-strip-N` via the
      # clang-N packages (currently N=18) but NOT the unversioned
      # `/usr/bin/llvm-strip` symlink (that comes from the `llvm`
      # metapackage, which isn't pulled in by default). Resolve
      # at runtime so the workflow survives image bumps without
      # editing. Flag-compatible with GNU strip for
      # `--strip-debug` and `--remove-section=`.
      - name: Strip unwind tables
        run: |
          set -euo pipefail
          LLVM_STRIP=$(command -v llvm-strip llvm-strip-18 llvm-strip-19 llvm-strip-17 2>/dev/null | head -n1)
          LLVM_READELF=$(command -v llvm-readelf llvm-readelf-18 llvm-readelf-19 llvm-readelf-17 2>/dev/null | head -n1)
          [ -n "${LLVM_STRIP}" ]   || { echo "no llvm-strip found on PATH"   >&2; exit 1; }
          [ -n "${LLVM_READELF}" ] || { echo "no llvm-readelf found on PATH" >&2; exit 1; }
          echo "using ${LLVM_STRIP} and ${LLVM_READELF}"
          for name in symbolon git-credential-symbolon; do
            BIN=target/${{ matrix.target }}/release/${name}
            BEFORE=$(stat -c%s "${BIN}")
            "${LLVM_STRIP}" --strip-debug \
                            --remove-section=.eh_frame \
                            --remove-section=.eh_frame_hdr \
                            --remove-section=.gcc_except_table \
                            "${BIN}"
            AFTER=$(stat -c%s "${BIN}")
            echo "Stripped ${BIN}: ${BEFORE} -> ${AFTER} bytes ($((BEFORE - AFTER)) saved)"
            # Belt-and-braces: confirm the sections we just asked
            # to remove are actually gone. Catches a silent no-op
            # (wrong flag name on a future llvm-strip version,
            # etc.) before the binary ships.
            if "${LLVM_READELF}" -S "${BIN}" | grep -qE '\.eh_frame|\.gcc_except_table'; then
              echo "unwind sections still present in ${BIN} after strip" >&2
              exit 1
            fi
          done
      - name: Package
        run: |
          set -euo pipefail
          for name in symbolon git-credential-symbolon; do
            BIN=target/${{ matrix.target }}/release/${name}
            OUT=${name}-${{ matrix.target }}
            cp "${BIN}" "${OUT}"
            sha256sum "${OUT}" > "${OUT}.sha256"
          done
      # Hand the four files (two binaries + their sha256s) off to
      # the downstream `release` job via a workflow artifact. NO
      # release-API interaction in this job — that's what avoided
      # the matrix-race-vs-Immutable-Releases bug. Each matrix leg
      # uploads under a unique artifact name; the release job
      # collects them all via `pattern: release-*`.
      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-${{ matrix.target }}
          path: |
            symbolon-${{ matrix.target }}
            symbolon-${{ matrix.target }}.sha256
            git-credential-symbolon-${{ matrix.target }}
            git-credential-symbolon-${{ matrix.target }}.sha256
          if-no-files-found: error
          retention-days: 7
  release:
    name: release
    needs: build
    runs-on: ubuntu-latest
    # Single publisher; only this job needs write on the release.
    permissions:
      contents: write
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: dist
          # Flatten all per-target artifacts into one directory so
          # the `files: dist/*` glob below picks up every file in
          # a single action-gh-release call.
          merge-multiple: true
      # softprops/action-gh-release is widely used and well-
      # maintained, but pin to a commit SHA so an upstream tag
      # move can't quietly change behavior. Bump deliberately.
      #
      # Two-step publish (draft → flip) instead of one-shot:
      # the action's upload-before-publish trick covers standard
      # releases under Immutable Releases, but it publishes
      # prereleases immediately rather than uploading-then-publishing
      # — which collides with the immutable-release lock on
      # prerelease tags (`v0.1.0-rc.1` etc.). softprops's own error
      # message recommends the workaround: keep as draft, then flip
      # via `gh release edit --draft=false`. The dance is uniform
      # for stable and prerelease tags, and idempotent across
      # re-runs: a failed previous attempt leaves a draft, the next
      # run finds it, re-uploads under `overwrite_files: true`, and
      # the flip step publishes.
      - name: Create draft release and upload assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/*
          fail_on_unmatched_files: true
          generate_release_notes: true
          draft: true
          overwrite_files: true
          # SemVer pre-release tags (`v0.1.0-rc.1`, `v0.1.0-beta.2`,
          # …) carry a `-` after the version core. Flag those so
          # GitHub keeps them out of the "Latest release" pin on the
          # repo homepage and fires `release.prereleased` to webhooks
          # instead of `release.released`. Stable tags (`v0.1.0`,
          # `v0.2.0`) have no `-` and publish normally.
          prerelease: ${{ contains(github.ref_name, '-') }}
      - name: Publish the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release edit "${{ github.ref_name }}" \
            --draft=false \
            --repo "${{ github.repository }}"
